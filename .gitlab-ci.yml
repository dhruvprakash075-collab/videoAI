stages:
  - test
  - scan

# Avoid duplicate pipelines: run MR pipelines when an MR is open,
# and branch pipelines only when no MR exists for the branch.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

# Cache only package-manager download caches. dashboard/node_modules was
# removed: `npm ci` deletes node_modules before installing, so caching it
# only added upload/download time without ever being reused.
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/uv
    - .cache/npm

python-test:
  stage: test
  image: python:3.12
  before_script:
    # uv resolves and installs wheels in parallel — much faster than pip
    # for this large requirements set (torch + CUDA wheels).
    - pip install uv
    - uv pip install --system -r requirements.txt
  script:
    - python -m ruff check .
    - python -m pytest -q --tb=short

frontend-test:
  stage: test
  image: node:24
  script:
    - cd dashboard
    - npm ci --no-audit --no-fund
    - npm run lint
    - npm run test:run
    - npm run build

skylos-scan:
  stage: scan
  image: python:3.12
  # needs: [] lets this job start immediately instead of waiting for the
  # test stage — it does not consume any artifacts from those jobs.
  needs: []
  # The scan is advisory: newer skylos versions exit non-zero when they
  # find dead code. The report artifact is what matters — findings
  # should be reviewed, not block the pipeline.
  allow_failure: true
  before_script:
    - pip install uv
    - mkdir -p diagnostics
  script:
    # skylos renamed --output-file to --output in a recent release; uvx
    # always installs the latest version, which broke this job without
    # any change on our side. Consider pinning (uvx skylos==X.Y.Z).
    - uvx skylos . -a --exclude "**/venv* **/__pycache__ **/*cache* **/external* **/studio_outputs*" --format concise --output diagnostics/skylos_ci_scan.txt
  # after_script runs even though the scan exits non-zero (it would be
  # skipped if appended to script). It echoes the report into the job
  # log so findings are reviewable without downloading artifacts.
  after_script:
    - cat diagnostics/skylos_ci_scan.txt
  artifacts:
    paths:
      - diagnostics/skylos_ci_scan.txt
    when: always
    expire_in: 1 week
