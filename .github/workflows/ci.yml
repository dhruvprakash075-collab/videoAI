name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions: {}

env:
  PIP_CACHE_DIR: ~/.cache/pip
  RUFF_CACHE_DIR: .ruff_cache

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pydantic pyyaml
      - name: Lint with Ruff
        run: ruff check . --output-format=github
      - name: Quick test import check
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from utils.errors import VideoAIError, FatalError, RecoverableError
          from config.config_schemas import (
              CharacterSpec, TTSConfig, CriticConfig, ResearchConfig,
              SEOConfig, SourceConfig, VisualConfig, VideoConfig,
              ScriptConfig, UploadConfig, DecisionRecord
          )
          from agents.ui_state import UIState
          print('All core imports OK')
          "

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy pydantic pyyaml httpx
      - name: Type check with mypy
        run: |
          python -m mypy config/config.py config/config_schemas.py \
                         utils/errors.py utils/retry_manager.py \
                         utils/crewai_breaker.py utils/checkpoint.py \
                         utils/circuit_breaker.py agents/ui_state.py \
                         core/post_production.py \
                         tests/test_config.py tests/test_config_schemas.py \
                         tests/test_post_production.py tests/test_uistate.py \
                         tests/test_retry_manager.py tests/test_crewai_breaker.py \
                         tests/test_checkpoint.py tests/test_circuit_breaker.py \
                         tests/unit/ tests/integration/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov
          pip install pydantic pyyaml httpx tqdm langgraph
      - name: Run CI test suite with coverage report
        run: |
          python -m pytest tests/test_config.py tests/test_config_schemas.py \
                     tests/test_post_production.py tests/test_comfyui.py \
                     tests/test_phase0_fallbacks.py tests/test_uistate.py \
                     tests/test_retry_manager.py \
                     tests/test_crewai_breaker.py tests/test_checkpoint.py \
                     tests/test_circuit_breaker.py \
                     tests/unit/ tests/integration/ \
                     -v --tb=short \
                     --cov \
                     --cov-report=term-missing \
                     --cov-fail-under=0
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: .coverage_cache/
