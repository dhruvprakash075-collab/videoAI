name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions: {}

env:
  PIP_CACHE_DIR: ~/.cache/pip
  RUFF_CACHE_DIR: .ruff_cache

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pydantic pyyaml types-PyYAML
      - name: Lint with Ruff
        run: ruff check . --output-format=github
      - name: Quick test import check
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from utils.errors import VideoAIError, FatalError, RecoverableError
          from config.config_schemas import (
              CharacterSpec, TTSConfig, CriticConfig, ResearchConfig,
              SEOConfig, SourceConfig, VisualConfig, VideoConfig,
              ScriptConfig, UploadConfig, DecisionRecord
          )
          from agents.ui_state import UIState
          print('All core imports OK')
          "

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy pydantic pyyaml httpx types-PyYAML
      - name: Type check with mypy
        run: |
          python -m mypy --follow-imports=skip --ignore-missing-imports config/config.py config/config_schemas.py \
                         utils/errors.py utils/retry_manager.py \
                         utils/crewai_breaker.py utils/checkpoint.py \
                         utils/circuit_breaker.py agents/ui_state.py \
                         core/post_production.py \
                         tests/test_config.py tests/test_config_schemas.py \
                         tests/test_post_production.py tests/test_uistate.py \
                         tests/test_retry_manager.py tests/test_crewai_breaker.py \
                         tests/test_checkpoint.py tests/test_circuit_breaker.py \
                         tests/unit/ tests/integration/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov
          pip install pydantic pyyaml httpx tqdm langgraph requests beautifulsoup4
          pip install -r comfyui_nodes/video_ai_nodes/requirements.txt
      - name: Video.AI ComfyUI node smoke import
        run: |
          python -c "import sys; sys.path.insert(0, 'comfyui_nodes'); import video_ai_nodes; assert hasattr(video_ai_nodes, 'comfy_entrypoint')"
      - name: Run Video.AI ComfyUI node tests
        run: python -m pytest tests/test_video_ai_nodes.py tests/test_video_ai_nodes_execution.py -q --tb=short
      - name: Run full test suite with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_video_ai_nodes.py \
            --ignore=tests/test_video_ai_nodes_execution.py \
            -v --tb=short \
            --cov --cov-report=term-missing --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: .coverage_cache/
