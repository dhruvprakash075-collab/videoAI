name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        shell: pwsh
        run: python -m ruff check .

      - name: Pytest
        shell: pwsh
        run: python -m pytest -q --tb=short

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend deps
        shell: pwsh
        run: |
          cd dashboard
          npm ci --no-audit --no-fund

      - name: Lint frontend
        shell: pwsh
        run: |
          cd dashboard
          npm run lint

      - name: Run frontend tests
        shell: pwsh
        run: |
          cd dashboard
          npm run test:run

      - name: Build frontend
        shell: pwsh
        run: |
          cd dashboard
          npm run build