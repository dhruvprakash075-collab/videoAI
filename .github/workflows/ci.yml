name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python: [3.12]
        node: [24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        shell: pwsh
        run: python -m ruff check .

      - name: Pytest
        shell: pwsh
        run: python -m pytest -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install frontend deps
        shell: pwsh
        run: |
          cd dashboard
          npm ci

      - name: Lint frontend
        shell: pwsh
        run: |
          cd dashboard
          npm run lint

      - name: Run frontend tests
        shell: pwsh
        run: |
          cd dashboard
          npm run test:run

      - name: Build frontend
        shell: pwsh
        run: |
          cd dashboard
          npm run build
