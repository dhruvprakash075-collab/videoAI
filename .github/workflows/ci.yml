name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PIP_CACHE_DIR: ~/.cache/pip
  RUFF_CACHE_DIR: .ruff_cache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with Ruff
        run: ruff check . --output-format=github
      - name: Quick test import check
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from utils.errors import VideoAIError, FatalError, RecoverableError
          from config.config_schemas import (
              CharacterSpec, TTSConfig, CriticConfig, ResearchConfig,
              SEOConfig, SourceConfig, VisualConfig, VideoConfig,
              ScriptConfig, UploadConfig, DecisionRecord
          )
          from agents.ui_state import UIState
          print('All core imports OK')
          "

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy pydantic
      - name: Type check with mypy
        run: |
          python -m mypy config/config_schemas.py config/config.py \
                     utils/errors.py utils/checkpoint.py utils/circuit_breaker.py \
                     --ignore-missing-imports --strict-optional

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov
          pip install pydantic pyyaml httpx
      - name: Run full test suite with coverage (80% floor)
        run: |
          python -m pytest tests/test_config.py tests/test_config_schemas.py \
                     tests/test_post_production.py tests/test_comfyui.py \
                     tests/test_phase0_fallbacks.py tests/test_uistate.py \
                     tests/test_errors.py tests/test_retry_manager.py \
                     tests/test_crewai_breaker.py tests/test_checkpoint.py \
                     tests/test_circuit_breaker.py \
                     tests/unit/ tests/integration/ \
                     -v --tb=short -x \
                     --cov=config --cov=utils --cov=core --cov=audio \
                     --cov-report=term-missing \
                     --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage_cache/
