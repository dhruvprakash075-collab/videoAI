name: rust-worker-ci

on:
  push:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-worker-ci.yml'
  pull_request:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-worker-ci.yml'

permissions: {}

defaults:
  run:
    working-directory: rust

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      # dtolnay/rust-toolchain uses branches for version tags; 1.81.0 branch SHA.
      - uses: dtolnay/rust-toolchain@1286434836c885251bdb8ef3bbb693bec6749247 # 1.81.0
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
