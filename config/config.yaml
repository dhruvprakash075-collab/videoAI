models:
  director: hermes-director
  writer: zephyr-writer
  script_gen: ollama/coder
  writer_scratch: cra-guided-7b
  writer_adapt: zephyr-writer
  image_engineer: image-engineer
  director_max_tokens: 2048
  translator: sarvam-translate
visual:
  num_scenes: 4
  style: Arcane-inspired semi-realistic 2D painterly animation, cinematic lighting,
    volumetric shadows, detailed faces, atmospheric fog
  environment_frame_ratio: 0.4
tts:
  lang: hi
  slow: false
  engine: supertonic
  supertonic:
    voice: character_voices/dhruv_voice_polished.json
    steps: 16
    speed: 1.0
    silence_duration: 0.1
    max_chunk_length: 150
  f5:
    model_path: hf_cache/hub/models--SPRINGLab--F5-Hindi-24KHz/snapshots/488556290bc8e35d3883554662f77eda413a7eb4
    ref_audio: character_voices/narration_ref_9s_mono24k.wav
    ref_text: एक रात सोते समय, बादशाह अकबर ने एक अजीब सपना देखा, कि केवल एक छोड़कर
      उनके बाकी सभी दाँत गिर गए हैं।
    nfe_step: 16
  edge:
    voice: hi-IN-MadhurNeural
    rate: +5%
    volume: +0%
  omnivoice:
    speed: 0.5
    num_step: 16
    guidance_scale: 2.5
    ref_text: एक रात सोते समय, बादशाह अकबर ने एक अजीब सपना देखा, कि केवल एक छोड़कर
      उनके बाकी सभी दाँत गिर गए हैं।
  indicf5:
    enabled: false
    python: indicf5_env/Scripts/python.exe
    model_id: ai4bharat/IndicF5
    cache_dir: hf_cache/indicf5
    ref_audio: character_voices/optimized/omnivoice_story_ref_mono24k.wav
    ref_text: रात शांत थी। एक छोटी लड़की लालटेन लेकर जंगल के रास्ते पर चल रही थी।
      उसे डर लग रहा था, फिर भी उसने हिम्मत रखी और सुबह से पहले घर लौट आई।
    sample_rate: 24000
    device: cuda
    nfe_step: 16
    speed: 1.0
    timeout_seconds: 600
    max_chars_per_chunk: 220
  voice_samples_dir: character_voices
  voice_profile:
    edge_voice: hi-IN-MadhurNeural
    edge_rate: +5%
    edge_volume: +0%
    sentence_gap_ms: 200
  devanagari:
    max_latin_ratio: 0.1
    max_retranslate_retries: 2
checkpoint:
  enabled: true
  dir: studio_checkpoints
  max_age_hours: 24
memory:
  memory_file: studio_checkpoints/story_memory.json
  llm_world_state: true
video:
  total_duration_min: 10
  segment_duration_min: 2
  fps: 24
  resolution: 1920x1080
  output_path: studio_outputs/final_video.mp4
  encoder: h264_nvenc
  encoder_preset: p5
  video_bitrate: 8M
  encoder_extra: -spatial-aq 1 -temporal-aq 1 -b_ref_mode 1 -bf 3
  crossfade_duration: 0.3
  ken_burns: light
  audio_crossfade_ms: 200
  generate_thumbnail: true
  motion_engine: none
  motion_seconds_per_image: 3
script:
  words_per_segment: 100
  min_words: 20
  max_words: 600
  dynamic_image_count: true
  default_images_per_segment: 4
  max_images_per_segment: 8
  word_count_tolerance: 0.6
  word_count_max_retries: 1
  writer_max_tokens: 1024
  llm_word_fix: false
  critic_enabled: true
  critic_threshold: 60
  critic_max_rewrites: 2
  uncapped_scaling: false
characters:
  protagonist:
    name: The Protagonist
    description: young adult, warm brown eyes, short black hair, determined expression,
      dark grey coat, athletic build, original character
    keywords:
    - hero
    - fight
    - journey
    - discover
    - challenge
    - courage
    - struggle
  mentor:
    name: The Mentor
    description: older wise figure, deep green eyes, grey beard, weathered face, long
      dark brown coat, carries a worn journal, mysterious aura
    keywords:
    - wisdom
    - guide
    - secret
    - knowledge
    - ancient
    - teach
    - warn
  guardian:
    name: The Guardian
    description: tall powerful figure, white hair, ice blue eyes, light silver armor,
      confident heroic stance, protective aura
    keywords:
    - protect
    - battle
    - sacrifice
    - light
    - defend
    - strength
    - duty
scene_templates:
  monster: corrupted creature looming, red fog glow, slow dolly-in
  fog: thick fog rolling, bluish-black haze, horizontal tracking
ollama:
  host: http://localhost:11434
  keep_alive: 3m
  request_timeout: 240
  breaker_fails: 3
  breaker_cooldown_s: 30
image_gen:
  backend: comfyui
  bonsai_model: prism-ml/bonsai-image-ternary-4B-gemlite-2bit
  height: 1024
  width: 1024
  steps: 12
  guidance_scale: 3.5
  ip_adapter_scale: 0.8
  lock_seed: true
  preview_steps: 12
  oom_recovery: true
  upscaler:
    model: none
    model_path: ''
    scale: 4
    target_width: 1920
    target_height: 1080
  comfyui:
    server: 127.0.0.1
    host: 127.0.0.1
    port: 8188
    root: C:\Video.AI\external\ComfyUI
    python: python
    auto_start: true
    open_browser: false
    workflow_path: C:\Video.AI\config\comfyui\workflows\text_to_image_api.json
    checkpoint: DreamShaper_8.safetensors
    width: 1024
    height: 1024
    steps: 20
    cfg: 7.0
    sampler_name: euler
    scheduler: normal
    timeout_seconds: 300
    poll_seconds: 1.0
    auto_start_timeout: 60
    unload_after_batch: false
  fallback_backend: bonsai
  composition_mode: one_pass
  layered_v3:
    approval_mode: auto
    character_threshold: 0.3
    closeup_threshold: 0.8
    max_characters: 2
    fallback_mode: one_pass
    workflows:
      character_sheet: ''
      background: ''
      character_pose: ''
      composite_refine: ''
    character_dir: studio_projects/{project}/characters
subtitles:
  format: classic
  font: Nirmala UI
  size: 22
  color: '&H00FFFFFF&'
  language: en
narrator:
  include_character_descriptions: false
cache:
  cache_invented_story: true
performance:
  max_workers: 1
  checkpoint_interval: 1
  whisper_model: tiny
  whisper_model_final: base
  ffmpeg_threads: 8
  vram_evict_wait_s: 15
  vram_sd_threshold_gb: 4.5
  max_segment_retries: 2
  staged_loop: true
  lookahead_segments: 3
audio_fx:
  enabled: true
  # Note: The following 9 SFX WAV files are currently missing and treated as no-ops:
  # wind, rain, heartbeat, footsteps, door_creak, whisper, scream, explosion, bell.
  volume: 0.25
  program_loudnorm: true
  loudnorm_two_pass: true
  target_lufs: -14
rvc:
  enabled: false
music:
  enabled: false
  ducking: true
  duck_ratio: 0.3
upload:
  enabled: true
  platform: youtube
  visibility: private
  profile_dir: chrome_profile
critic:
  enabled: true
  threshold: 60
  max_rewrites: 2
research:
  enabled: true
  sources:
  - wikipedia
  - wikimedia
  - rss
  rss_urls: []
  user_agent: VideoAI/6.0 (+https://github.com/...)
  budget: 3
  timeout_s: 15
  per_source_limit: 3
seo:
  enabled: true
  title_max_chars: 100
  description_max_chars: 5000
  tags_count: 15
  hashtags_count: 5
  chapters_max: 50
  description_paragraphs: 2
source:
  allowed_extensions:
  - .txt
  - .md
  - .pdf
  - .docx
  max_words: 50000
  url_timeout_s: 30
  user_agent: VideoAI/6.0 (+https://github.com/...)
