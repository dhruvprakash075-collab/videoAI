models:
  director: hermes-director
  writer: zephyr-writer
  writer_scratch: cra-guided-7b
  writer_adapt: zephyr-writer
  image_engineer: image-engineer
  director_max_tokens: 2048
  translator: sarvam-translate
visual:
  num_scenes: 4
  style: >
    arcane-inspired semi-realistic colored manga panel style, clean black ink outlines,
    cel-shaded anime colors, vibrant but controlled color palette, screentone texture,
    dynamic manga action composition, dynamic close-up framing, expressive sharp eyes,
    no text, no letters, no symbols, detailed clothing folds, clean background shapes,
    high contrast Japanese manga illustration
  environment_frame_ratio: 0.4
tts:
  lang: hi
  engine: indicf5
  indicf5:
    root: D:\IndicF5
    python: C:\Video.AI\venv\Scripts\python.exe
    ref_audio: character_voices/narration_ref_9s_mono24k_ref8s_mono.wav
    ref_text_file: character_voices/narration_ref_9s_mono24k.txt
    ref_text: >-
      एक रात सोते समय, बादशाह अकबर ने एक अजीब सपना देखा, कि केवल एक छोड़कर
      उनके बाकी सभी दाँत गिर गए हैं।
    use_pipeline_voice_sample: false
    timeout_seconds: 900
  supertonic:
    voice: character_voices/dhruv_narration.json
    steps: 16
    speed: 1.0
    silence_duration: 0.1
    max_chunk_length: 150
  omnivoice:
    speed: 0.5
    num_step: 16
    guidance_scale: 2.5
    ref_text:
      एक रात सोते समय, बादशाह अकबर ने एक अजीब सपना देखा, कि केवल एक छोड़कर
      उनके बाकी सभी दाँत गिर गए हैं।
  voice_samples_dir: character_voices
  voice_profile:
    sentence_gap_ms: 200
  devanagari:
    hinglish_ratio: 0.4
    max_latin_ratio: 0.1
    max_retranslate_retries: 2
checkpoint:
  enabled: true
  dir: studio_checkpoints
  max_age_hours: 24
memory:
  memory_file: studio_checkpoints/story_memory.json
  llm_world_state: true
video:
  total_duration_min: 10
  segment_duration_min: 2
  fps: 24
  resolution: 1920x1080
  output_path: studio_outputs/final_video.mp4
  encoder: h264_nvenc
  encoder_preset: p5
  video_bitrate: 8M
  encoder_extra: -spatial-aq 1 -temporal-aq 1 -b_ref_mode 1 -bf 3
  crossfade_duration: 0.3
  ken_burns: light
  audio_crossfade_ms: 200
  generate_thumbnail: true
script:
  words_per_segment: 100
  min_words: 20
  max_words: 600
  dynamic_image_count: false
  default_images_per_segment: 2
  max_images_per_segment: 4
  word_count_tolerance: 0.6
  tts_words_per_minute_hi: 100
  tts_words_per_minute_en: 150
  writer_max_tokens: 1024
  uncapped_scaling: false
characters:
  protagonist:
    name: The Protagonist
    description:
      young adult, warm brown eyes, short black hair, determined expression,
      dark grey coat, athletic build, original character
    keywords:
      - hero
      - fight
      - journey
      - discover
      - challenge
      - courage
      - struggle
  mentor:
    name: The Mentor
    description:
      older wise figure, deep green eyes, grey beard, weathered face, long
      dark brown coat, carries a worn journal, mysterious aura
    keywords:
      - wisdom
      - guide
      - secret
      - knowledge
      - ancient
      - teach
      - warn
  guardian:
    name: The Guardian
    description:
      tall powerful figure, white hair, ice blue eyes, light silver armor,
      confident heroic stance, protective aura
    keywords:
      - protect
      - battle
      - sacrifice
      - light
      - defend
      - strength
      - duty
scene_templates:
  monster: corrupted creature looming, red fog glow, slow dolly-in
  fog: thick fog rolling, bluish-black haze, horizontal tracking
ollama:
  host: http://localhost:11434
  keep_alive: 3m
  request_timeout: 240
  breaker_fails: 3
  breaker_cooldown_s: 30
image_gen:
  backend: comfyui

  height: 512
  width: 768
  steps: 30
  guidance_scale: 3.5
  ip_adapter_scale: 0.8
  lock_seed: true
  composition_mode: one_pass
  panel_composite:
    enabled: true
    layout_file: config/panel_layouts.roboflow.json
    fallback_layout_file: config/panel_layouts.json
    width: 1920
    height: 1080
    margin: 48
    gutter: 24
    border: 6
  face_inspiration:
    enabled: true
    prompt_bank: config/anime_face_inspiration.json
    phrases_per_prompt: 3
  upscaler:
    model: none
    model_path: ""
    scale: 4
    target_width: 1920
    target_height: 1080
  comfyui:
    server: 127.0.0.1
    host: 127.0.0.1
    port: 8188
    reuse_ports: [8189]
    root: external/ComfyUI
    python: external/ComfyUI/.venv/Scripts/python.exe
    auto_start: true
    open_browser: false
    workflow_path: config/comfyui/workflows/manga_ipadapter_style_api.json
    checkpoint: meinamix_meinaV11.safetensors
    width: 768
    height: 512
    steps: 30
    cfg: 7.0
    sampler_name: dpmpp_2m
    scheduler: karras
    negative_prompt: "panel border, comic border, frame border, gutter, 3d, render, photo, realism, plastic skin, painterly realism, cinematic realism, volumetric fog, monochrome, grayscale, black and white, blurry, muddy colors, sketchy lines, bad face, distorted face, deformed face, malformed eyes, asymmetrical eyes, bad anatomy, duplicate face, tiny face, cropped face, melted features, extra limbs, broken hands, text, letters, symbols, kanji, logo, watermark, unreadable text"
    vae_name: vae-ft-mse-840000-ema-pruned.safetensors
    loras:
      - { lora_name: manhwa_webtoon_v1.safetensors, strength_model: 0.5, strength_clip: 0.5 }
      - { lora_name: anime_lineart_manga_v1.safetensors, strength_model: 0.3, strength_clip: 0.3 }
    reference_image: reference_assets/uploaded_20260708/ref_zip_1/page/page_1.png
    reference_image_dir: reference_assets/face_reference_pools/anime_face
    reference_usage: direct
    reference_seed_mode: prompt_hash
    refine_upscale: true
    refine_workflow_path: config/comfyui/workflows/manga_refine_upscale_api.json
    timeout_seconds: 300
    poll_seconds: 1.0
    auto_start_timeout: 60
    unload_after_batch: true
subtitles:
  format: classic
  font: Nirmala UI
  size: 18
  color: "&H00FFFFFF&"
  language: en
narrator:
  include_character_descriptions: false
cache:
  cache_invented_story: true
performance:
  max_workers: 1
  whisper_model: tiny
  whisper_model_final: base
  ffmpeg_threads: 8
  vram_evict_wait_s: 15
  vram_sd_threshold_gb: 4.5
  max_segment_retries: 2
  staged_loop: true
  lookahead_segments: 3
audio_fx:
  enabled: true
  # Note: The following 9 SFX WAV files are currently missing and treated as no-ops:
  # wind, rain, heartbeat, footsteps, door_creak, whisper, scream, explosion, bell.
  volume: 0.25
  program_loudnorm: true
  target_lufs: -14
music:
  enabled: false
  ducking: true
  duck_ratio: 0.3
upload:
  enabled: false
  platform: youtube
  visibility: private
  profile_dir: chrome_profile
critic:
  enabled: true
  threshold: 60
  max_rewrites: 2
research:
  enabled: true
  sources:
    - wikipedia
    - wikimedia
    - rss
  rss_urls: []
  user_agent: VideoAI/6.0 (+https://github.com/...)
  budget: 3
  timeout_s: 15
  per_source_limit: 3
seo:
  enabled: true
  title_max_chars: 100
  description_max_chars: 5000
  tags_count: 15
  hashtags_count: 5
  chapters_max: 50
  description_paragraphs: 2
source:
  allowed_extensions:
    - .txt
    - .md
    - .pdf
    - .docx
  max_words: 50000
  url_timeout_s: 30
  user_agent: VideoAI/6.0 (+https://github.com/...)
